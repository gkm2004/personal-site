<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurinayat Mangat</title>
  <link rel="stylesheet" href="style.css" />    
</head>
<body>

  <header>
    <nav>
      <a href="#home">Home/</a>
      <a href="#projects">Projects/</a>
      <a href="#collaborate">Collaborate/</a>
      <a href="#binder">Binder/</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="home">
      <h1>Gurinayat Mangat</h1>
      <p>I'm a computer science student interested in how data and systems shape how we see the world...</p>
      <div class="actions">
        <button onclick="document.location='#projects'">View projects</button>
        <button onclick="document.location='#collaborate'">Collaborate with me</button>
        <button onclick="document.location='#binder'">View Binder</button>
        <button onclick="document.location='#contact'">Contact</button>
      </div>
    </section>

    </main>

  <div class="folder-icon-container" onclick="openWindow()">
    <img src="https://img.icons8.com/color/96/folder-invoices.png" alt="Journal Folder">
    <span class="folder-label">Junk Journal</span>
  </div>

  <div id="journal-window" class="journal-window">
    <div class="window-header" id="window-header">
      <span class="window-title">C:\Users\Gurinayat\JunkJournal</span>
      <div class="window-controls">
        <button onclick="closeWindow()">X</button>
      </div>
    </div>

    <div class="window-body">
      <div id="main-directory" class="folder-grid">
        <div class="sub-folder" onclick="openFolder('Lab Log')">
          <img src="https://img.icons8.com/color/96/folder-invoices.png" alt="Folder">
          <p>Lab Log</p>
        </div>
        <div class="sub-folder" onclick="openFolder('Archives')">
          <img src="https://img.icons8.com/color/96/folder-invoices.png" alt="Folder">
          <p>Archives</p>
        </div>
        <div class="sub-folder" onclick="openFolder('The Pocket')">
          <img src="https://img.icons8.com/color/96/folder-invoices.png" alt="Folder">
          <p>The Pocket</p>
        </div>
      </div>

      <div id="art-view">
        <span class="back-btn" onclick="showDirectory()"><- Back to Folders</span>
        <h3 id="folder-name-display" style="font-size: 14px; margin-bottom: 10px;"></h3>
        <div class="art-grid" id="art-content">
          </div>
      </div>
    </div>
  </div>

  <footer>
    <p><strong>Gurinayat Mangat</strong> | © 2026</p>
  </footer>

  <script>
    const windowEl = document.getElementById('journal-window');
    const mainDir = document.getElementById('main-directory');
    const artView = document.getElementById('art-view');
    const artContent = document.getElementById('art-content');
    const folderNameDisplay = document.getElementById('folder-name-display');

    // MOCK DATA: Replace these with your actual filenames!
    const myArt = {
      'Lab Log': ['bug_screenshot.png', 'terminal_output.jpeg'],
      'Archives': ['vintage_map.png', 'botanical_sketch.jpeg'],
      'The Pocket': ['desk_photo.png', 'moodboard.jpeg']
    };

    function openWindow() { windowEl.style.display = 'flex'; }
    function closeWindow() { windowEl.style.display = 'none'; }

    function openFolder(folderName) {
      mainDir.style.display = 'none';
      artView.style.display = 'block';
      folderNameDisplay.innerText = folderName;
      
      // Clear previous content
      artContent.innerHTML = '';
      
      // Add your art pieces
      myArt[folderName].forEach(file => {
        const item = document.createElement('div');
        item.className = 'art-piece';
        item.innerHTML = `<p style="font-size:9px; color:gray;">${file}</p>
                          <div style="background:#eee; height:100px; display:flex; align-items:center; justify-content:center; color:#999; font-size:10px;">
                            [IMAGE: ${file}]
                          </div>`; 
        // Note: Once you have real files, change the div above to an <img src="path/${file}">
        artContent.appendChild(item);
      });
    }

    function showDirectory() {
      mainDir.style.display = 'grid';
      artView.style.display = 'none';
    }

    // MAKE WINDOW DRAGGABLE
    dragElement(windowEl);

    function dragElement(elmnt) {
      var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      if (document.getElementById("window-header")) {
        document.getElementById("window-header").onmousedown = dragMouseDown;
      }

      function dragMouseDown(e) {
        e.preventDefault();
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
      }

      function elementDrag(e) {
        e.preventDefault();
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
        elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
      }

      function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }
  </script>
</body>
</html>
