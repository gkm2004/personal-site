<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a5175"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#09080f"/>

  <!-- PR input -->
  <rect x="20" y="185" width="130" height="50" rx="6" fill="#110e1c" stroke="#2a2440" stroke-width="1.5"/>
  <text x="85" y="207" fill="#eeeef8" font-size="13" text-anchor="middle">Pull Request</text>
  <text x="85" y="223" fill="#5a5175" font-size="10" text-anchor="middle">opened / updated</text>

  <!-- Arrow to orchestrator -->
  <line x1="150" y1="210" x2="200" y2="210" stroke="#5a5175" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <rect x="205" y="180" width="110" height="60" rx="6" fill="#3D1E63" stroke="#5C2D91" stroke-width="1.5"/>
  <text x="260" y="205" fill="#eeeef8" font-size="12" text-anchor="middle" font-weight="bold">Orchestrator</text>
  <text x="260" y="221" fill="#ccc8e8" font-size="10" text-anchor="middle">fan-out (async)</text>

  <!-- 4 parallel agents -->
  <!-- connecting lines -->
  <line x1="315" y1="210" x2="345" y2="65"  stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="315" y1="210" x2="345" y2="150" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="315" y1="210" x2="345" y2="270" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="315" y1="210" x2="345" y2="355" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>

  <g>
    <rect x="350" y="35" width="150" height="60" rx="6" fill="#106EBE" stroke="#005A9E" stroke-width="1.5"/>
    <text x="425" y="60" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">Diff Analyst</text>
    <text x="425" y="76" fill="#dbe9f7" font-size="9.5" text-anchor="middle">secrets · schema · retries</text>
  </g>

  <g>
    <rect x="350" y="120" width="150" height="60" rx="6" fill="#106EBE" stroke="#005A9E" stroke-width="1.5"/>
    <text x="425" y="145" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">History Agent</text>
    <text x="425" y="161" fill="#dbe9f7" font-size="9.5" text-anchor="middle">file ↔ past incidents</text>
  </g>

  <g>
    <rect x="350" y="240" width="150" height="60" rx="6" fill="#106EBE" stroke="#005A9E" stroke-width="1.5"/>
    <text x="425" y="265" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">Coverage Agent</text>
    <text x="425" y="281" fill="#dbe9f7" font-size="9.5" text-anchor="middle">test regression gaps</text>
  </g>

  <g>
    <rect x="350" y="325" width="150" height="60" rx="6" fill="#106EBE" stroke="#005A9E" stroke-width="1.5"/>
    <text x="425" y="350" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">Timing Agent</text>
    <text x="425" y="366" fill="#dbe9f7" font-size="9.5" text-anchor="middle">deploy-window risk</text>
  </g>

  <!-- lines to verdict -->
  <line x1="500" y1="65"  x2="560" y2="210" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="150" x2="560" y2="210" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="270" x2="560" y2="210" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="355" x2="560" y2="210" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Verdict agent -->
  <rect x="565" y="175" width="150" height="70" rx="6" fill="#8E562E" stroke="#6B4423" stroke-width="1.5"/>
  <text x="640" y="200" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">Verdict Agent</text>
  <text x="640" y="216" fill="#f3e3d3" font-size="9.5" text-anchor="middle">weighted aggregation</text>
  <text x="640" y="230" fill="#f3e3d3" font-size="9.5" text-anchor="middle">risk brief + rollback plan</text>

  <!-- arrow to score -->
  <line x1="715" y1="210" x2="750" y2="210" stroke="#5a5175" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Score badge -->
  <circle cx="805" cy="210" r="55" fill="#110e1c" stroke="#b8a9f8" stroke-width="2"/>
  <text x="805" y="200" fill="#eeeef8" font-size="11" text-anchor="middle">Confidence</text>
  <text x="805" y="219" fill="#f5c842" font-size="22" text-anchor="middle" font-weight="bold">0–100</text>

  <!-- Outcome branches -->
  <line x1="770" y1="255" x2="700" y2="330" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="840" y1="255" x2="880" y2="330" stroke="#5a5175" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="560" y="335" width="150" height="42" rx="6" fill="#107C10" stroke="#0B5A0B" stroke-width="1.5"/>
  <text x="635" y="361" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">≥70 · Greenlight</text>

  <rect x="740" y="335" width="150" height="42" rx="6" fill="#A4262C" stroke="#7F1D1D" stroke-width="1.5"/>
  <text x="815" y="361" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="bold">&lt;70 · Blocked</text>

  <!-- caption -->
  <text x="450" y="410" fill="#5a5175" font-size="10.5" text-anchor="middle">four specialist agents run in parallel · verdict agent aggregates weighted signals</text>
</svg>
